# ================================================================
# Documentation et tests des modèles staging
# ================================================================
# Ce fichier sert deux objectifs :
# 1. Documenter chaque modèle et chaque colonne (apparaît dans dbt docs)
# 2. Définir des tests automatisés (`dbt test`)
# ================================================================

version: 2

models:
  - name: stg_matches
    description: "Matchs de Ligue 1 nettoyés et enrichis avec des flags utiles (is_psg_match, psg_side, is_finished)."
    columns:
      - name: match_id
        description: "Identifiant unique du match."
        data_tests:
          - not_null
          - unique
      - name: utc_date
        description: "Date et heure du match en UTC."
        data_tests:
          - not_null
      - name: match_date
        description: "Date du match (sans heure) — pratique pour les regroupements."
      - name: status
        description: "Statut du match (SCHEDULED, FINISHED, POSTPONED, etc.)."
        data_tests:
          - not_null
      - name: home_team_id
        description: "ID football-data.org de l'équipe à domicile."
        data_tests:
          - not_null
      - name: away_team_id
        description: "ID football-data.org de l'équipe à l'extérieur."
        data_tests:
          - not_null
      - name: is_psg_match
        description: "TRUE si le PSG joue (à domicile ou à l'extérieur)."
      - name: psg_side
        description: "Côté du PSG dans le match : 'HOME', 'AWAY' ou NULL."
        data_tests:
          - accepted_values:
              arguments:
                values: ['HOME', 'AWAY']
              config:
                where: "is_psg_match = true"

  - name: stg_standings
    description: "Classement Ligue 1 — toutes vues confondues (TOTAL/HOME/AWAY selon disponibilité de l'API)."
    columns:
      - name: standings_type
        description: "Type de classement (TOTAL, HOME ou AWAY)."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['TOTAL', 'HOME', 'AWAY']
      - name: position
        description: "Position de l'équipe dans le classement (1 = leader)."
        data_tests:
          - not_null
      - name: team_id
        description: "ID football-data.org de l'équipe."
        data_tests:
          - not_null
      - name: points
        description: "Points cumulés par l'équipe sur la saison."
        data_tests:
          - not_null
      - name: is_psg
        description: "TRUE si la ligne concerne le PSG."

  - name: stg_scorers
    description: "Top buteurs Ligue 1 enrichis (âge calculé, ratio buts/match, flag joueur PSG)."
    columns:
      - name: rank
        description: "Position du joueur dans le classement des buteurs."
        data_tests:
          - not_null
      - name: player_id
        description: "ID football-data.org du joueur."
        data_tests:
          - not_null
      - name: goals
        description: "Nombre total de buts marqués sur la saison."
        data_tests:
          - not_null
      - name: player_age
        description: "Âge actuel du joueur en années (calculé depuis player_date_of_birth)."
      - name: goals_per_match
        description: "Ratio buts par match disputé (NULL si played_matches = 0)."
      - name: is_psg_player
        description: "TRUE si le joueur évolue au PSG."
